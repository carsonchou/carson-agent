<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>J.A.R.V.I.S — 量化阿森</title>
<style>
  :root{ --amb:#e0a85f; --amb2:#f3cd92; --dim:#9b774a; --green:#7fd6a0; --red:#ff8b6b; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#0a0704;color:#f0dcc0;overflow:hidden;
    font-family:"Rajdhani","Microsoft JhengHei","Segoe UI",sans-serif;letter-spacing:.04em;}
  #bg{position:fixed;inset:0;z-index:0;}
  .vig{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 42%,rgba(8,5,2,.88) 100%);}
  .scan{position:fixed;inset:0;z-index:40;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0,rgba(0,0,0,.14) 1px,transparent 2px,transparent 4px);opacity:.28;}
  .wrap{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;padding:22px 30px;pointer-events:none;}
  .top{display:flex;align-items:flex-end;justify-content:space-between;}
  .brand h1{font-size:32px;font-weight:700;color:#fff0db;letter-spacing:.34em;text-shadow:0 0 22px rgba(224,168,95,.85);}
  .brand .sub{font-size:11px;color:var(--dim);letter-spacing:.4em;margin-top:2px;}
  #clock{font-size:30px;color:#fff0db;text-shadow:0 0 16px rgba(224,168,95,.7);line-height:1;text-align:right;}
  #date{font-size:11px;color:var(--dim);letter-spacing:.22em;margin-top:4px;text-align:right;}
  .on{font-size:12px;color:var(--green);letter-spacing:.2em;text-align:right;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);display:inline-block;margin-right:6px;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .mid{flex:1;display:flex;justify-content:space-between;align-items:center;min-height:0;}
  .side{display:flex;flex-direction:column;gap:18px;width:330px;}
  .panel{position:relative;pointer-events:auto;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;
    background:linear-gradient(135deg,rgba(70,45,20,.42),rgba(30,18,8,.32));
    -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);
    border:1px solid rgba(224,168,95,.32);border-radius:3px;padding:14px 16px;
    box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 0 26px rgba(224,168,95,.07);
    clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));}
  .panel.l{transform:perspective(900px) rotateY(-7deg);}
  .panel.r{transform:perspective(900px) rotateY(7deg);}
  .panel.l:hover{transform:perspective(900px) rotateY(-3deg) scale(1.035);border-color:var(--amb);box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 26px rgba(224,168,95,.35);}
  .panel.r:hover{transform:perspective(900px) rotateY(3deg) scale(1.035);border-color:var(--amb);box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 26px rgba(224,168,95,.35);}
  .panel h2{font-size:11px;color:var(--amb);letter-spacing:.26em;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-shadow:0 0 8px rgba(224,168,95,.5);}
  .panel h2::before{content:"";width:5px;height:15px;background:var(--amb);box-shadow:0 0 9px var(--amb);}
  .panel h2 .more{margin-left:auto;font-size:9px;color:var(--dim);letter-spacing:.1em;}
  .kpi{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px dashed rgba(224,168,95,.14);}
  .kpi:last-child{border-bottom:none;}
  .kpi .k{font-size:13px;color:#cB9b6f;}
  .kpi .v{font-size:23px;font-weight:600;color:#fff0db;text-shadow:0 0 12px rgba(224,168,95,.5);}
  .v.good{color:var(--green);text-shadow:0 0 12px rgba(127,214,160,.6);}
  .v.bad{color:var(--red);text-shadow:0 0 12px rgba(255,139,107,.6);}
  .v.gold{color:var(--amb2);text-shadow:0 0 12px rgba(243,205,146,.6);}
  .coretag{position:fixed;left:50%;transform:translateX(-50%);text-align:center;z-index:3;pointer-events:none;}
  .coretag.t{top:27%;}.coretag.b{bottom:21%;}
  .coretag .big{font-size:17px;letter-spacing:.32em;color:#fff0db;text-shadow:0 0 16px rgba(224,168,95,.75);}
  .coretag .sm{font-size:10px;letter-spacing:.4em;color:var(--dim);margin-top:4px;}
  #board{position:fixed;inset:0;z-index:4;pointer-events:none;}
  #board .lhead{position:fixed;left:40px;top:92px;font-size:11px;color:var(--amb);letter-spacing:.26em;opacity:.8;pointer-events:none;}
  .item{position:fixed;width:404px;display:flex;align-items:center;gap:14px;cursor:grab;padding:14px 18px;pointer-events:auto;
    background:linear-gradient(135deg,rgba(70,45,20,.40),rgba(26,16,7,.30));
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid rgba(224,168,95,.22);border-left:3px solid rgba(224,168,95,.6);
    transition:background .16s,box-shadow .16s,border-color .16s;
    clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);}
  .item:hover{border-color:var(--amb);border-left-color:var(--amb2);
    background:linear-gradient(135deg,rgba(224,168,95,.22),rgba(26,16,7,.36));box-shadow:0 0 26px rgba(224,168,95,.34);}
  .item.dragging{cursor:grabbing;box-shadow:0 0 38px rgba(224,168,95,.5);z-index:20;}
  .item .ic{font-size:17px;color:var(--amb);width:24px;text-align:center;text-shadow:0 0 10px var(--amb);}
  .item .nm{flex:1;font-size:16px;color:#fff0db;letter-spacing:.06em;}
  .item .nm .sub2{display:block;font-size:11px;color:var(--dim);letter-spacing:.1em;margin-top:2px;}
  .item .val{font-size:20px;font-weight:600;color:var(--amb2);text-shadow:0 0 10px rgba(243,205,146,.5);}
  .item .arr{color:var(--dim);font-size:14px;}
  .footbar{position:relative;z-index:3;pointer-events:none;display:flex;gap:14px;align-items:baseline;padding:4px 4px 0;}
  .footbar .fl{font-size:11px;color:var(--amb);letter-spacing:.2em;flex:0 0 auto;}
  #focus{font-size:15px;color:#f3e2cb;line-height:1.5;}#focus b{color:var(--amb2);}
  .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:6;font-size:11px;color:var(--dim);letter-spacing:.2em;pointer-events:none;}
  .hudc{position:fixed;width:28px;height:28px;border:2px solid rgba(224,168,95,.55);z-index:5;}
  .hudc.tl{top:14px;left:14px;border-right:0;border-bottom:0;}.hudc.tr{top:14px;right:14px;border-left:0;border-bottom:0;}
  .hudc.bl{bottom:14px;left:14px;border-right:0;border-top:0;}.hudc.br{bottom:14px;right:14px;border-left:0;border-top:0;}
  /* 展開細節 overlay */
  /* 浮動可拖曳視窗(可同時多開)：背景不擋，抓標題列拖移 */
  .card{position:fixed;z-index:60;width:min(880px,86vw);max-height:82vh;overflow:auto;
    opacity:0;transform:scale(.92);transition:opacity .24s,transform .24s;
    background:linear-gradient(135deg,rgba(58,38,16,.95),rgba(20,13,6,.97));
    border:1px solid rgba(224,168,95,.55);border-radius:4px;padding:20px 26px 24px;
    box-shadow:0 18px 70px rgba(0,0,0,.62),0 0 50px rgba(224,168,95,.26),inset 0 0 40px rgba(224,168,95,.06);
    clip-path:polygon(0 0,calc(100% - 24px) 0,100% 24px,100% 100%,24px 100%,0 calc(100% - 24px));}
  .card.show{opacity:1;transform:scale(1);}
  .card .hd{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(224,168,95,.3);padding-bottom:12px;margin-bottom:18px;cursor:move;user-select:none;}
  .card .hd h3{font-size:18px;}
  .card .hd h3::before{content:"⠿ ";color:var(--dim);}
  .card .hd h3{font-size:20px;color:#fff0db;letter-spacing:.2em;text-shadow:0 0 14px rgba(224,168,95,.6);}
  .card .x{cursor:pointer;color:var(--amb);border:1px solid rgba(224,168,95,.5);width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:3px;}
  .card .x:hover{background:rgba(224,168,95,.15);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
  .mini{border:1px solid rgba(224,168,95,.28);background:rgba(224,168,95,.05);padding:12px 14px;border-radius:3px;}
  .mini .t{font-size:12px;color:var(--amb);letter-spacing:.2em;margin-bottom:8px;}
  .mini .row{display:flex;justify-content:space-between;font-size:13px;color:#d7bf9c;padding:3px 0;}
  .mini .row b{color:#fff0db;font-weight:600;}
  .big2{width:100%;height:200px;margin-top:8px;}
</style>

<body>
<canvas id="bg"></canvas>
<div class="vig"></div><div class="scan"></div>
<div class="hudc tl"></div><div class="hudc tr"></div><div class="hudc bl"></div><div class="hudc br"></div>

<div class="wrap">
  <div class="top">
    <div class="brand"><h1>J.A.R.V.I.S</h1><div class="sub">量化阿森 ・ AUTONOMOUS OPS</div></div>

  <div class="item" data-kind="youtube"><div class="ic">▶</div><div class="nm">YouTube 頻道<span class="sub2">量化阿森 Carson</span></div><div class="val" id="li_y">—</div><div class="arr">▸</div></div>
  <div class="item" data-kind="warehouse"><div class="ic">▤</div><div class="nm">內容工廠 ・ 倉庫<span class="sub2">品質 ・ 待發</span></div><div class="val" id="li_q">—</div><div class="arr">▸</div></div>
  <div class="item" data-kind="finance"><div class="ic">＄</div><div class="nm">變現 ・ 財務<span class="sub2">營收 ・ 淨利</span></div><div class="val" id="li_f">—</div><div class="arr">▸</div></div>
  <div class="item" data-kind="decisions"><div class="ic">!</div><div class="nm">待你拍板<span class="sub2">決策佇列</span></div><div class="val" id="li_d">—</div><div class="arr">▸</div></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const CY=new THREE.Color(0xe0a85f);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200); cam.position.set(0,0,8.5);
const controls=new OrbitControls(cam,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.enablePan=false;
controls.minDistance=4.2; controls.maxDistance=15; controls.autoRotate=true; controls.autoRotateSpeed=0.5;

function dotTex(){const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,240,220,1)');g.addColorStop(.25,'rgba(224,170,110,.9)');
  g.addColorStop(.55,'rgba(180,120,70,.42)');g.addColorStop(1,'rgba(180,120,70,0)');
  x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const TEX=dotTex();
const pmat=(s,o)=>new THREE.PointsMaterial({size:s,map:TEX,color:CY,transparent:true,opacity:o,depthWrite:false,blending:THREE.AdditiveBlending});
const core=new THREE.Group(); scene.add(core);
const NG=12000,R=2.5,gp=new Float32Array(NG*3),ga=2.399963229;
for(let i=0;i<NG;i++){const y=1-(i/(NG-1))*2,r=Math.sqrt(1-y*y),ph=i*ga;
  // 半徑與位置都加亂數 → 球殼有厚度、粒子散落不是乾淨殼；少數粒子飄更遠製造游離感
  const rr=R*(0.78+Math.random()*0.42)*(Math.random()<0.06?1.25:1);
  const j=()=>(Math.random()-0.5)*0.28;
  gp[i*3]=Math.cos(ph)*r*rr+j(); gp[i*3+1]=y*rr+j(); gp[i*3+2]=Math.sin(ph)*r*rr+j();}
const gg=new THREE.BufferGeometry();gg.setAttribute('position',new THREE.BufferAttribute(gp,3));
const globe=new THREE.Points(gg,pmat(0.07,0.9)); core.add(globe);
const globe2=new THREE.Points(gg.clone(),pmat(0.05,0.5)); globe2.scale.setScalar(0.7); core.add(globe2);
const coreGlow=new THREE.Points(new THREE.BufferGeometry().setAttribute('position',new THREE.BufferAttribute(new Float32Array([0,0,0]),3)),pmat(1.6,1)); core.add(coreGlow);
const NA=2600,ap=new Float32Array(NA*3);
for(let i=0;i<NA;i++){const r=7+Math.random()*40,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);ap[i*3]=r*Math.sin(ph)*Math.cos(th);ap[i*3+1]=r*Math.sin(ph)*Math.sin(th);ap[i*3+2]=r*Math.cos(ph);}
const ag=new THREE.BufferGeometry();ag.setAttribute('position',new THREE.BufferAttribute(ap,3));
const amb=new THREE.Points(ag,pmat(0.10,0.45)); scene.add(amb);
const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,cam));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.8,0.7,0.08);
composer.addPass(bloom);composer.addPass(new OutputPass());
function size(){renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();}
size(); addEventListener('resize',()=>{size();drawSpark(window._series);});

const STATES={idle:{glow:0.10,spin:0.4,bright:0.7,label:'待命中',sub:'STANDBY'},
  listening:{glow:0.28,spin:1.0,bright:1.0,label:'聆聽中…',sub:'LISTENING'},
  thinking:{glow:0.42,spin:3.4,bright:1.2,label:'思考中…',sub:'PROCESSING'},
  speaking:{glow:0.78,spin:1.6,bright:1.55,label:'回應中',sub:'SPEAKING'}};
window.JST='idle'; let _lj='';
const cm=document.getElementById('core_main'),cs=document.getElementById('core_sub');
let t=0,gA=0.12,bright=0.7;
function loop(){
  t+=0.004; const s=STATES[window.JST]||STATES.idle;
  gA+=(s.glow-gA)*0.07; bright+=(s.bright-bright)*0.07;
  controls.autoRotateSpeed+=(s.spin-controls.autoRotateSpeed)*0.05;
  if(window.JST!==_lj){_lj=window.JST;cm.textContent=s.label;cs.textContent=s.sub;}
  globe2.rotation.y-=0.002; globe2.rotation.x+=0.001;
  const fast=window.JST==='speaking'?160:(window.JST==='thinking'?250:520);
  coreGlow.scale.setScalar(1+gA*(2.4+Math.sin(Date.now()/fast)*2.4));
  globe.material.opacity=Math.min(1,0.9*bright);amb.material.opacity=0.45*bright;coreGlow.material.opacity=Math.min(1,bright);
  const br=window.JST==='speaking'?1+0.05*Math.sin(Date.now()/150):1; globe.scale.setScalar(br);globe2.scale.setScalar(0.7*br);
  amb.rotation.y+=0.0004; controls.update(); composer.render(); requestAnimationFrame(loop);
}
loop();

function tick(){const n=new Date(),wk=['日','一','二','三','四','五','六'][n.getDay()];
  clock.textContent=n.toLocaleTimeString('zh-TW',{hour12:false});
  date.textContent=n.getFullYear()+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+String(n.getDate()).padStart(2,'0')+'  星期'+wk+'  台北';}
setInterval(tick,1000);tick();

function drawSpark(series,cid){const c=document.getElementById(cid||'spark');if(!c)return;const g=c.getContext('2d');
  const w=c.width=c.clientWidth,h=c.height=c.clientHeight;g.clearRect(0,0,w,h);
  if(!series||series.length<2){g.fillStyle='#9b774a';g.font='12px sans-serif';g.fillText('累積資料中…',12,h/2);return;}
  const v=series.map(p=>p.views),lo=Math.min(...v),hi=Math.max(...v),rng=(hi-lo)||1,pad=10;
  g.beginPath();v.forEach((x,i)=>{const px=pad+(w-2*pad)*i/(v.length-1),py=h-pad-(h-2*pad)*(x-lo)/rng;i?g.lineTo(px,py):g.moveTo(px,py);});
  g.strokeStyle='#e0a85f';g.lineWidth=2;g.shadowColor='#e0a85f';g.shadowBlur=12;g.stroke();
  g.lineTo(w-pad,h-pad);g.lineTo(pad,h-pad);g.closePath();g.shadowBlur=0;g.fillStyle='rgba(224,168,95,.10)';g.fill();}

const fmt=n=>n==null?'—':Number(n).toLocaleString('en-US');
const pct=n=>n==null?'—':(n*100).toFixed(1)+'%';
const set=(id,v,cls)=>{const e=document.getElementById(id);if(!e)return;e.textContent=v;e.className='v'+(cls?' '+cls:'');};
window._data={};
const wins=new Map(); let ztop=60, woff=0;   // 多視窗：kind→元素、最上層 z、開窗位移
const li=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
async function pull(){try{
  const d=await(await fetch('/api/data',{cache:'no-store'})).json(); window._data=d;
  const tr=d.trading||{},y=d.youtube||{};
  li('li_t', tr.total_return!=null?((tr.total_return>=0?'+':'')+pct(tr.total_return)):'—');
  li('li_y', y.subs!=null?fmt(y.subs)+' 訂閱':'—');
  li('li_q', y.pending!=null?fmt(y.pending)+' 待發':'—');
  li('li_f', y.net!=null?'NT$ '+fmt(Math.round(y.net)):'—');
  li('li_d', (y.decisions||0)+' 件');
  focus.innerHTML=d.focus||'一切順。';
  wins.forEach((el,k)=>renderWin(el,k));   // 刷新所有開著的視窗
}catch(e){focus.textContent='（連不上資料來源，重試中…）';}}
pull(); setInterval(pull,5000);
async function pullState(){try{const j=await(await fetch('/api/state',{cache:'no-store'})).json();if(j&&j.state)window.JST=j.state;}catch(e){}}
setInterval(pullState,350); pullState();

// ── 可同時多開的浮動細節視窗（鋼鐵人攤多個全息面板）──
function row(k,v){return `<div class="row"><span>${k}</span><b>${v}</b></div>`;}
function drawSparkEl(cv,series){const g=cv.getContext('2d');const w=cv.width=cv.clientWidth,h=cv.height=cv.clientHeight||180;g.clearRect(0,0,w,h);
  if(!series||series.length<2){g.fillStyle='#9b774a';g.font='12px sans-serif';g.fillText('累積資料中…',12,h/2);return;}
  const v=series.map(p=>p.views),lo=Math.min(...v),hi=Math.max(...v),rng=(hi-lo)||1,pad=10;
  g.beginPath();v.forEach((x,i)=>{const px=pad+(w-2*pad)*i/(v.length-1),py=h-pad-(h-2*pad)*(x-lo)/rng;i?g.lineTo(px,py):g.moveTo(px,py);});
  g.strokeStyle='#e0a85f';g.lineWidth=2;g.shadowColor='#e0a85f';g.shadowBlur=12;g.stroke();
  g.lineTo(w-pad,h-pad);g.lineTo(pad,h-pad);g.closePath();g.shadowBlur=0;g.fillStyle='rgba(224,168,95,.10)';g.fill();}
function renderWin(el,kind){
  const d=window._data||{}, T=el.querySelector('h3'), B=el.querySelector('.bd');
  const tr=d.trading||{}, y=d.youtube||{};
  if(kind==='trading'){
    const fr=tr.frames||{};
    T.textContent='交易引擎 ・ '+(tr.symbol||'')+' ・ 策略回測';
    let cards=Object.keys(fr).map(k=>{const f=fr[k];return `<div class="mini"><div class="t">${k}</div>
      ${row('總報酬',pct(f.total_return))}${row('Sharpe',f.sharpe!=null?f.sharpe.toFixed(2):'—')}
      ${row('勝率',pct(f.win_rate))}${row('最大回撤',pct(f.max_drawdown))}
      ${row('交易數',f.num_trades??'—')}${row('期末權益',fmt(Math.round(f.final_equity||0)))}</div>`;}).join('');
    const p=tr.params||{};
    B.innerHTML=`<div class="cards">${cards||'<div class="mini">尚無回測資料</div>'}</div>
      <div style="margin-top:16px;color:#c9a877;font-size:13px;">策略參數：${Object.keys(p).length?Object.entries(p).map(([k,v])=>k+'='+v).join('  ・  '):'—'}　｜　模式：<b style="color:#f3cd92">DRY-RUN（模擬，未動真錢）</b></div>`;
  } else if(kind==='youtube'){
    T.textContent='YouTube ・ 量化阿森 ・ 頻道成長';
    B.innerHTML=`<div class="cards"><div class="mini"><div class="t">成長</div>
      ${row('訂閱數',fmt(y.subs))}${row('總觀看',fmt(y.views))}${row('離 YPP',fmt(Math.max(0,1000-(y.subs||0)))+' 訂閱')}</div></div>
      <div style="margin-top:16px;color:#e0a85f;font-size:12px;letter-spacing:.2em;">近期觀看走勢</div>
      <canvas class="big2 dspark"></canvas>`;
    setTimeout(()=>{const cv=B.querySelector('.dspark'); if(cv)drawSparkEl(cv,y.series);},30);
  } else if(kind==='warehouse'){
    const w=y.warehouse||{};
    T.textContent='內容工廠 ・ 倉庫品質';
    B.innerHTML=`<div class="cards"><div class="mini"><div class="t">倉庫狀態</div>
      ${row('待發布',fmt(w.pending))}${row('累計上架',fmt(w.published))}${row('達標',fmt(w.pass))}${row('待補強',fmt(w.reject))}${row('品質門檻',w.min_score??'—')}</div></div>`;
  } else if(kind==='finance'){
    const f=y.finance||{};
    T.textContent='變現 ・ 財務（'+(f.month||'本月')+'）';
    B.innerHTML=`<div class="cards"><div class="mini"><div class="t">損益</div>
      ${row('營收',fmt(f.revenue))}${row('成本',fmt(f.cost))}${row('淨利',fmt(f.net))}${row('ROI',f.roi!=null?f.roi+'%':'—')}</div>
      <div class="mini"><div class="t">收入來源</div>${row('聯盟返佣',fmt(f.affiliate))}${row('AdSense',fmt(f.adsense))}</div></div>`;
  } else if(kind==='decisions'){
    const dl=y.decision_list||[];
    T.textContent='待你拍板 ・ 決策佇列（'+(y.decisions||0)+' 件）';
    B.innerHTML= dl.length
      ? `<div style="display:flex;flex-direction:column;gap:10px;">`+dl.map((q,i)=>`<div class="mini"><div class="row"><span style="color:#e0a85f;flex:0 0 auto;margin-right:12px">#${i+1}</span><b style="text-align:left">${q}</b></div></div>`).join('')+`</div>`
      : `<div class="mini">目前沒有待你拍板的決策，工廠自己跑著。</div>`;
  }
}
window.openDetail=function(kind){
  let el=wins.get(kind);
  if(el){el.style.zIndex=++ztop; return;}            // 已開→帶到最前，不重複
  el=document.createElement('div'); el.className='card'; el.dataset.kind=kind;
  el.innerHTML='<div class="hd"><h3>—</h3><div class="x">✕</div></div><div class="bd"></div>';
  document.body.appendChild(el); wins.set(kind,el);
  const w=Math.min(880,innerWidth*0.86);
  el.style.left=Math.min(innerWidth-w-20,150+woff)+'px'; el.style.top=(64+woff)+'px';
  el.style.zIndex=++ztop; woff=(woff+38)%200;
  el.querySelector('.x').addEventListener('click',()=>{el.remove(); wins.delete(kind);});
  el.addEventListener('mousedown',()=>{el.style.zIndex=++ztop;});   // 點到帶到最前
  const hd=el.querySelector('.hd'); let dg=false,ox,oy;
  hd.addEventListener('mousedown',e=>{if(e.target.classList.contains('x'))return;
    dg=true;const r=el.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;el.style.transition='none';e.preventDefault();});
  addEventListener('mousemove',e=>{if(!dg)return;el.style.left=(e.clientX-ox)+'px';el.style.top=(e.clientY-oy)+'px';});
  addEventListener('mouseup',()=>{if(dg){dg=false;el.style.transition='opacity .24s,transform .24s';}});
  renderWin(el,kind); requestAnimationFrame(()=>el.classList.add('show'));
};
addEventListener('keydown',e=>{if(e.key==='Escape'){const a=[...wins.values()]; const last=a[a.length-1];
  if(last){wins.delete(last.dataset.kind); last.remove();}}});

// ── 專案方塊：自由拖曳排列 + 自動避免重疊 + 沒拖動=點擊展開 ──
const blocks=[...document.querySelectorAll('#board .item')];
blocks.forEach((b,i)=>{b.style.left='40px';b.style.top=(122+i*74)+'px';});  // 初始左側直排
function ov(a,b){return !(a.right<=b.left||a.left>=b.right||a.bottom<=b.top||a.top>=b.bottom);}
const MG=6,TOP=80,clampv=v=>Math.max(-42,Math.min(42,v));
function moveBy(el,dx,dy){
  el.style.left=Math.max(MG,Math.min(innerWidth-el.offsetWidth-MG,(parseFloat(el.style.left)||0)+dx))+'px';
  el.style.top=Math.max(TOP,Math.min(innerHeight-el.offsetHeight-12,(parseFloat(el.style.top)||0)+dy))+'px';}
// 全域分離：每幀對所有方塊兩兩檢查，重疊就沿較短重疊軸推開 → 永遠不會疊在一起。
// 正在拖的方塊(bd)當錨點不動，被它壓到的整個讓開；其餘兩塊各退一半。
function separate(){
  for(let p=0;p<10;p++){let any=false;
    for(let i=0;i<blocks.length;i++)for(let j=i+1;j<blocks.length;j++){
      const A=blocks[i],B=blocks[j],a=A.getBoundingClientRect(),b=B.getBoundingClientRect();
      if(!ov(a,b))continue; any=true;
      const dx=Math.min(a.right,b.right)-Math.max(a.left,b.left),dy=Math.min(a.bottom,b.bottom)-Math.max(a.top,b.top);
      if(dx<=dy){const d=a.left<b.left?1:-1;
        if(A===bd)moveBy(B,d*(dx+1),0); else if(B===bd)moveBy(A,-d*(dx+1),0);
        else{moveBy(A,-d*(dx/2+0.6),0);moveBy(B,d*(dx/2+0.6),0);}
      }else{const d=a.top<b.top?1:-1;
        if(A===bd)moveBy(B,0,d*(dy+1)); else if(B===bd)moveBy(A,0,-d*(dy+1));
        else{moveBy(A,0,-d*(dy/2+0.6));moveBy(B,0,d*(dy/2+0.6));}}
    }
    if(!any)break;
  }
}
const vel=new Map(); blocks.forEach(b=>vel.set(b,{x:0,y:0}));
let bd=null,bmoved=false,bsx,bsy,box,boy,lmx,lmy;
blocks.forEach(b=>b.addEventListener('mousedown',e=>{bd=b;bmoved=false;bsx=lmx=e.clientX;bsy=lmy=e.clientY;
  const r=b.getBoundingClientRect();box=e.clientX-r.left;boy=e.clientY-r.top;vel.set(b,{x:0,y:0});
  b.classList.add('dragging');e.preventDefault();}));
addEventListener('mousemove',e=>{if(!bd)return;if(Math.hypot(e.clientX-bsx,e.clientY-bsy)>4)bmoved=true;
  bd.style.left=Math.max(MG,Math.min(innerWidth-bd.offsetWidth-MG,e.clientX-box))+'px';
  bd.style.top=Math.max(TOP,Math.min(innerHeight-bd.offsetHeight-12,e.clientY-boy))+'px';
  vel.set(bd,{x:clampv(e.clientX-lmx),y:clampv(e.clientY-lmy)});lmx=e.clientX;lmy=e.clientY;});
addEventListener('mouseup',()=>{if(!bd)return;const el=bd;bd=null;el.classList.remove('dragging');
  if(!bmoved){vel.set(el,{x:0,y:0});openDetail(el.dataset.kind);return;}
  const v=vel.get(el),w=el.offsetWidth,h=el.offsetHeight,l=parseFloat(el.style.left)||0,t=parseFloat(el.style.top)||0;
  if(l<=MG+1)v.x=Math.abs(v.x)+15; if(l>=innerWidth-w-MG-1)v.x=-Math.abs(v.x)-15;   // 貼邊放開→彈回場內
  if(t<=TOP+1)v.y=Math.abs(v.y)+15; if(t>=innerHeight-h-12-1)v.y=-Math.abs(v.y)-15;});
function physics(){
  for(const b of blocks){ if(b===bd)continue; const v=vel.get(b); if(!v)continue;
    if(Math.abs(v.x)<0.15&&Math.abs(v.y)<0.15){v.x=v.y=0;continue;}
    let l=(parseFloat(b.style.left)||0)+v.x, t=(parseFloat(b.style.top)||0)+v.y;
    const w=b.offsetWidth,h=b.offsetHeight,maxX=innerWidth-w-MG,maxY=innerHeight-h-12;
    if(l<MG){l=MG;v.x=-v.x*0.7;} else if(l>maxX){l=maxX;v.x=-v.x*0.7;}   // 撞牆反彈
    if(t<TOP){t=TOP;v.y=-v.y*0.7;} else if(t>maxY){t=maxY;v.y=-v.y*0.7;}
    v.x*=0.93; v.y*=0.93;   // 摩擦
    b.style.left=l+'px'; b.style.top=t+'px';
  }
  separate();   // 每幀分離所有方塊 → 永不重疊（含靜止時）
  requestAnimationFrame(physics);
}
physics();
</script>
