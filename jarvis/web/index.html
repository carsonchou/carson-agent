<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>J.A.R.V.I.S</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='5' fill='%234ca8e8'/></svg>">
<meta name="theme-color" content="#050508">
<style>
  :root{ --blue:#4ca8e8; --dim:#7fa8c8; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#050508; }
  body{ font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif; color:#cfe6f8; }
  #orb{ position:fixed; inset:0; display:block; }
  /* HUD */
  .hud{ position:fixed; inset:0; pointer-events:none; }
  .brand{ position:absolute; top:26px; left:50%; transform:translateX(-50%);
    font-family:"Share Tech Mono",monospace; letter-spacing:.55em; font-size:15px;
    color:var(--blue); text-shadow:0 0 18px rgba(76,168,232,.6); opacity:.85; padding-left:.55em; }
  .status{ position:absolute; top:54px; left:50%; transform:translateX(-50%);
    font-size:12px; letter-spacing:.3em; color:var(--dim); opacity:.7; }
  .caption{ position:absolute; left:50%; bottom:13%; transform:translateX(-50%);
    width:min(720px,84vw); text-align:center; }
  .you{ font-size:15px; color:#9fc4e0; opacity:.7; min-height:20px; transition:opacity .3s; }
  .jarvis{ font-size:21px; line-height:1.55; color:#e8f4ff; margin-top:10px; min-height:30px;
    text-shadow:0 0 22px rgba(76,168,232,.35); transition:opacity .3s; }
  .hint{ position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-size:12.5px; color:var(--dim); opacity:.55; letter-spacing:.05em; }
  /* 起始遮罩：瀏覽器規定要先有使用者手勢才能開麥克風/放音 */
  #gate{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; background:radial-gradient(circle at 50% 45%,rgba(76,168,232,.06),#050508 70%); cursor:pointer; z-index:10; }
  #gate .ring{ width:120px; height:120px; border-radius:50%; border:1px solid rgba(76,168,232,.4);
    display:flex; align-items:center; justify-content:center; color:var(--blue);
    font-family:"Share Tech Mono",monospace; letter-spacing:.2em; font-size:13px;
    box-shadow:0 0 50px rgba(76,168,232,.25),inset 0 0 30px rgba(76,168,232,.15); animation:breathe 3s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.85 } 50%{ transform:scale(1.06); opacity:1 } }
  #gate p{ color:var(--dim); font-size:14px; letter-spacing:.08em; }
  .mic{ position:absolute; top:50%; right:30px; transform:translateY(-50%);
    width:8px; height:8px; border-radius:50%; background:#2a3a48; transition:all .25s; }
  .mic.on{ background:#5ad27a; box-shadow:0 0 14px #5ad27a; }
  .err{ color:#eb6b6b !important; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
</head>
<body>
<canvas id="orb"></canvas>
<div class="hud">
  <div class="brand">J . A . R . V . I . S</div>
  <div class="status" id="status">待命</div>
  <div class="mic" id="mic"></div>
  <div class="caption">
    <div class="you" id="you"></div>
    <div class="jarvis" id="jarvis"></div>
  </div>
  <div class="hint" id="hint">點一下畫面喚醒，然後直接對它說話</div>
</div>
<div id="gate"><div class="ring">啟動</div><p>點一下進入 — 賈維斯待命</p></div>

<script type="module">
import * as THREE from "three";

/* ════════════ orb：粒子 + 連線 + 電子 + 四狀態 + 音訊反應（移植自參考實作並調校）════════════ */
function createOrb(canvas){
  const N=2000;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x050508,1);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,1000);
  camera.position.z=80;

  const pos=new Float32Array(N*3), vel=new Float32Array(N*3), phase=new Float32Array(N);
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=Math.pow(Math.random(),0.5)*25;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    phase[i]=Math.random()*1000;
  }
  const geo=new THREE.BufferGeometry(); geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0x4ca8e8,size:0.4,transparent:true,opacity:.6,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
  const points=new THREE.Points(geo,mat); scene.add(points);

  const MAX_LINES=8000; const linePos=new Float32Array(MAX_LINES*6);
  const lineGeo=new THREE.BufferGeometry(); lineGeo.setAttribute("position",new THREE.BufferAttribute(linePos,3));
  lineGeo.setDrawRange(0,0);
  const lineMat=new THREE.LineBasicMaterial({color:0x4ca8e8,transparent:true,opacity:0,
    blending:THREE.AdditiveBlending,depthWrite:false});
  const lines=new THREE.LineSegments(lineGeo,lineMat); scene.add(lines);

  const MAX_E=200; const ePos=new Float32Array(MAX_E*3);
  const eGeo=new THREE.BufferGeometry(); eGeo.setAttribute("position",new THREE.BufferAttribute(ePos,3)); eGeo.setDrawRange(0,0);
  const eMat=new THREE.PointsMaterial({color:0xffffff,size:0.8,transparent:true,opacity:1,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
  const electrons=new THREE.Points(eGeo,eMat); scene.add(electrons);
  const activeE=[]; let lastSpawn=0; let conns=[];

  let state="idle", lastState="idle";
  let cR=25,cS=0.3,cB=0.6,cZ=0.4, lineAmt=0, tR=25,tS=0.3,tB=0.6,tZ=0.4,tLine=0,tErate=0,eRate=0;
  let spinX=0,spinY=0,spinZ=0,trans=0, cloudZ=0,cloudZVel=0;
  let analyser=null, freq=new Uint8Array(64), bass=0, mid=0;
  const clock=new THREE.Clock();

  function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    if(state==="idle"){ tR=28;tS=0.2;tB=0.5;tZ=0.35;tLine=0.15;tErate=0; }
    else if(state==="listening"){ tR=22;tS=0.35;tB=0.7;tZ=0.42;tLine=0.45;tErate=0; }
    else if(state==="thinking"){ tR=16;tS=0.5;tB=0.72;tZ=0.3;tLine=1.0;tErate=0.015; }
    else if(state==="speaking"){ tR=18;tS=0.25;tB=0.75;tZ=0.42;tLine=0.8;tErate=0; }
    cR+=(tR-cR)*0.03; cS+=(tS-cS)*0.03; cB+=(tB-cB)*0.03; cZ+=(tZ-cZ)*0.03;
    lineAmt+=(tLine-lineAmt)*0.03; eRate+=(tErate-eRate)*0.03;

    if(state!==lastState){ trans=1; lastState=state; }
    trans*=0.985;
    if(trans>0.05){ spinX+=trans*0.012*Math.sin(t*1.7); spinY+=trans*0.015; spinZ+=trans*0.008*Math.cos(t*1.3); }

    bass=0; mid=0;
    if(analyser){ analyser.getByteFrequencyData(freq);
      let b=0,m=0; for(let i=0;i<8;i++)b+=freq[i]; for(let i=8;i<24;i++)m+=freq[i];
      bass=b/(8*255); mid=m/(16*255); }

    let zT=Math.sin(t*0.12)*8;
    if(state==="thinking")zT=Math.sin(t*0.3)*15+Math.sin(t*0.9)*6;
    else if(state==="speaking")zT=Math.sin(t*0.15)*6-bass*10;
    cloudZVel+=(zT-cloudZ)*0.008; cloudZVel*=0.94; cloudZ+=cloudZVel;
    points.rotation.set(spinX,spinY,spinZ); points.position.z=cloudZ;
    lines.rotation.set(spinX,spinY,spinZ); lines.position.z=cloudZ;
    electrons.rotation.set(spinX,spinY,spinZ); electrons.position.z=cloudZ;

    const a=geo.getAttribute("position").array;
    for(let i=0;i<N;i++){ const i3=i*3; let x=a[i3],y=a[i3+1],z=a[i3+2]; const px=phase[i];
      vel[i3]+=Math.sin(t*0.05+px)*0.001*cS; vel[i3+1]+=Math.cos(t*0.06+px*1.3)*0.001*cS; vel[i3+2]+=Math.sin(t*0.055+px*0.7)*0.001*cS;
      vel[i3]+=Math.sin(t*0.02+px*2.1+y*0.1)*0.0008*cS; vel[i3+1]+=Math.cos(t*0.025+px*1.7+z*0.1)*0.0008*cS; vel[i3+2]+=Math.sin(t*0.022+px*0.9+x*0.1)*0.0008*cS;
      const d=Math.sqrt(x*x+y*y+z*z)||0.01; const pull=Math.max(0,d-cR)*0.002+0.0003;
      vel[i3]-=(x/d)*pull; vel[i3+1]-=(y/d)*pull; vel[i3+2]-=(z/d)*pull;
      if(bass>0.05){ vel[i3]+=(x/d)*bass*0.02; vel[i3+1]+=(y/d)*bass*0.02; vel[i3+2]+=(z/d)*bass*0.02; }
      if(state==="speaking"&&mid>0.1){ const pu=Math.sin(t*8+px); vel[i3]+=(x/d)*mid*0.012*pu; vel[i3+1]+=(y/d)*mid*0.012*pu; }
      vel[i3]*=0.992; vel[i3+1]*=0.992; vel[i3+2]*=0.992;
      a[i3]+=vel[i3]; a[i3+1]+=vel[i3+1]; a[i3+2]+=vel[i3+2];
    }
    geo.getAttribute("position").needsUpdate=true;

    if(lineAmt>0.01){ const la=lineGeo.getAttribute("position").array; let lc=0;
      const md=8*(1+bass*0.5), mdSq=md*md, step=Math.max(1,Math.floor(N/600));
      for(let i=0;i<N&&lc<MAX_LINES;i+=step){ const i3=i*3,x1=a[i3],y1=a[i3+1],z1=a[i3+2];
        for(let j=i+step;j<N&&lc<MAX_LINES;j+=step){ const j3=j*3,dx=a[j3]-x1,dy=a[j3+1]-y1,dz=a[j3+2]-z1;
          if(dx*dx+dy*dy+dz*dz<mdSq){ const k=lc*6; la[k]=x1;la[k+1]=y1;la[k+2]=z1;la[k+3]=a[j3];la[k+4]=a[j3+1];la[k+5]=a[j3+2]; lc++; } } }
      lineGeo.setDrawRange(0,lc*2); lineGeo.getAttribute("position").needsUpdate=true; lineMat.opacity=lineAmt*0.12;
      conns=[]; for(let c=0;c<Math.min(lc,500);c++){ const ci=c*6; conns.push([la[ci],la[ci+1],la[ci+2],la[ci+3],la[ci+4],la[ci+5]]); }
    } else { lineGeo.setDrawRange(0,0); conns=[]; }

    if(conns.length&&eRate>0.005&&activeE.length<3&&(t-lastSpawn)>1){
      const c=conns[(Math.random()*conns.length)|0];
      activeE.push({s:[c[0],c[1],c[2]],e:[c[3],c[4],c[5]],t:0,sp:0.003+Math.random()*0.003}); lastSpawn=t;
    }
    const ea=eGeo.getAttribute("position").array; let alive=0;
    for(let e=activeE.length-1;e>=0;e--){ const el=activeE[e]; el.t+=el.sp; if(el.t>=1){ activeE.splice(e,1); continue; }
      const k=alive*3; ea[k]=el.s[0]+(el.e[0]-el.s[0])*el.t; ea[k+1]=el.s[1]+(el.e[1]-el.s[1])*el.t; ea[k+2]=el.s[2]+(el.e[2]-el.s[2])*el.t; alive++; }
    eGeo.setDrawRange(0,alive); eGeo.getAttribute("position").needsUpdate=true;

    mat.opacity=cB+bass*0.08; mat.size=cS*0+0.4+bass*0.05;
    const col=state==="thinking"?0x6ec4ff:state==="speaking"?0x5ab8f0:0x4ca8e8;
    mat.color.lerp(new THREE.Color(col),0.02); lineMat.color.lerp(new THREE.Color(col),0.02);
    camera.position.x=Math.sin(t*0.02)*5; camera.position.y=Math.cos(t*0.03)*3; camera.lookAt(0,0,cloudZ*0.2);
    renderer.render(scene,camera);
  }
  addEventListener("resize",()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  animate();
  return { setState:s=>{state=s;}, setAnalyser:a=>{ analyser=a; if(a)freq=new Uint8Array(a.frequencyBinCount); } };
}

/* ════════════ 語音迴圈：Chrome Web Speech 聽 → 後端動腦/操控 → edge 嗓音念回，orb 跟著動 ════════════ */
const orb=createOrb(document.getElementById("orb"));
const $=id=>document.getElementById(id);
const setStatus=(txt,st)=>{ $("status").textContent=txt; orb.setState(st); };

let audioCtx, analyser, recog, shouldListen=false, speaking=false, started=false;

function setMic(on){ $("mic").classList.toggle("on",on); }

function initAudio(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.8;
  analyser.connect(audioCtx.destination);
}

function buildRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ $("jarvis").textContent="這個瀏覽器不支援語音辨識，請用 Chrome。"; $("jarvis").classList.add("err"); return null; }
  const r=new SR(); r.continuous=true; r.interimResults=true; r.lang="zh-TW";
  r.onresult=ev=>{
    let interim="";
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const tr=ev.results[i][0].transcript;
      if(ev.results[i].isFinal){ const text=tr.trim(); if(text&&!speaking) handle(text); }
      else interim+=tr;
    }
    if(interim&&!speaking){ $("you").textContent=interim; }
  };
  r.onend=()=>{ setMic(false); if(shouldListen&&!speaking){ try{ r.start(); setMic(true);}catch(e){} } };
  r.onerror=ev=>{ if(ev.error==="not-allowed"){ $("jarvis").textContent="麥克風被擋了，請允許存取。"; $("jarvis").classList.add("err"); shouldListen=false; } };
  return r;
}

async function handle(text){
  $("jarvis").classList.remove("err");
  $("you").textContent=text;
  $("jarvis").textContent="";
  setStatus("思考中","thinking");
  speaking=true;                 // 暫停聽，避免收到自己的聲音
  try{ recog && recog.stop(); }catch(e){}
  let res;
  try{
    const r=await fetch("/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
    res=await r.json();
  }catch(e){ res={reply:"後端連不上，伺服器還在嗎？",kind:"error"}; }
  const reply=(res.reply||"").trim();
  $("jarvis").textContent=reply;
  if(reply){ setStatus("說話中","speaking"); await speak(reply); }
  speaking=false;
  setStatus("聆聽中","listening");
  if(shouldListen){ try{ recog.start(); setMic(true);}catch(e){} }
}

async function speak(text){
  // 先用後端 edge 磁性男聲；失敗退瀏覽器內建語音
  try{
    if(audioCtx.state==="suspended") await audioCtx.resume();
    const r=await fetch("/tts?text="+encodeURIComponent(text));
    if(!r.ok) throw new Error("tts "+r.status);
    const buf=await r.arrayBuffer();
    const ab=await audioCtx.decodeAudioData(buf);
    const src=audioCtx.createBufferSource(); src.buffer=ab; src.connect(analyser);
    orb.setAnalyser(analyser);
    await new Promise(res=>{ src.onended=res; src.start(); });
    orb.setAnalyser(null);
  }catch(e){
    await new Promise(res=>{ try{
      const u=new SpeechSynthesisUtterance(text); u.lang="zh-TW"; u.onend=res; u.onerror=res;
      speechSynthesis.speak(u);
    }catch(_){ res(); } });
  }
}

function start(){
  if(started) return; started=true;
  $("gate").style.display="none";
  initAudio();
  recog=buildRecog();
  if(!recog) return;
  shouldListen=true;
  setStatus("聆聽中","listening");
  $("hint").textContent="直接說話即可 — 例如「現在幾點」「打開記事本」「看一下螢幕」";
  try{ recog.start(); setMic(true); }catch(e){}
  // 開場招呼
  setTimeout(()=>{ if(!speaking){ $("jarvis").textContent="賈維斯待命中，老闆。"; } },300);
}
$("gate").addEventListener("click",start);
addEventListener("keydown",e=>{ if(e.key===" "||e.key==="Enter") start(); });
</script>
</body>
</html>
