name: 伺服器控制

on:
  schedule:
    - cron: '20 4,12 * * *'
  workflow_dispatch:
    inputs:
      cmd:
        description: '要執行的指令'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 執行指令
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script_stop: false
          script: |
            ${{ github.event.inputs.cmd != '' && github.event.inputs.cmd || secrets.MONITOR_SCRIPT }}
