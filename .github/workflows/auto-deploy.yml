name: 自動部署 scripts 到伺服器

on:
  push:
    branches:
      - 'claude/**'
      - main
    paths:
      - 'youtube_channel/scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 部署變更的 scripts 並重啟 Dashboard
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          envs: GH_TOKEN,BRANCH
          script_stop: false
          script: |
            REPO="carsonchou/carson-agent"
            API="https://api.github.com/repos/$REPO/contents/youtube_channel/scripts"
            DST="/root/yt/scripts"
            NEED_RESTART=0

            for SCRIPT in audit_video quality_score produce_batch decision_dept control_center web_dashboard train_depts daily_publish retrofit_shorts_tags ai_budget; do
              FILE="${SCRIPT}.py"
              HTTP=$(curl -o /tmp/${FILE} -sfH "Authorization: token $GH_TOKEN" \
                -w "%{http_code}" "${API}/${FILE}?ref=${BRANCH}")
              if [ "$HTTP" = "200" ]; then
                python3 -c "
import json,base64
d=json.load(open('/tmp/${FILE}'))
open('${DST}/${FILE}','wb').write(base64.b64decode(d['content'].replace(chr(10),'')))
print('✅ 已更新 ${FILE}')
"
                [ "$SCRIPT" = "web_dashboard" ] && NEED_RESTART=1
              fi
            done

            if [ "$NEED_RESTART" = "1" ]; then
              fuser -k 8080/tcp 2>/dev/null
              sleep 2
              nohup /root/yt/.venv/bin/python /root/yt/scripts/web_dashboard.py \
                --key carson2026 </dev/null >> /root/yt/logs/dashboard.log 2>&1 &
              echo "🚀 Dashboard 已重啟，PID: $!"
            else
              echo "ℹ️ web_dashboard.py 未變動，跳過重啟"
            fi

            # 若 audit_video 或 quality_score 有更新，重新評分讓前端立即看到正確分數
            echo "🔄 重新評分（套用最新 audit 邏輯）…"
            cd /root/yt && .venv/bin/python scripts/quality_score.py 2>&1 | tail -3
            echo "✅ 重新評分完成"
